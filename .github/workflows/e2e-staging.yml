name: E2E (Staging · self-contained)

# Builds and runs the app inside the runner against the *dev* Convex deployment,
# seeds throw-away data, and executes the FULL Playwright suite — including the
# mutating specs (customer return, admin mark-paid). No Vercel preview and no
# production build config are involved.
#
# Requires one repo secret: CONVEX_DEPLOY_KEY = a *dev* deploy key
# (Convex dashboard → Project → Settings → Deploy Keys → Development).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dev deployment URL is public (not a secret).
  NEXT_PUBLIC_CONVEX_URL: https://marvelous-starfish-830.convex.cloud

jobs:
  e2e:
    name: Build · Seed · Playwright (dev backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed dev Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex run e2e:seed

      - name: Build
        run: npm run build

      - name: Run E2E (full suite)
        env:
          E2E_WEB_COMMAND: npm run start -- --port 3000
        run: npx playwright test -c playwright.staging.config.ts

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
