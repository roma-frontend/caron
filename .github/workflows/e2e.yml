name: E2E (Preview)

# Runs the Playwright funnel against each successful Vercel *preview* deploy.
# Vercel emits a `deployment_status` event when a deploy finishes; we read the
# preview URL from it and point Playwright at that URL — never production.
on:
  deployment_status

concurrency:
  group: e2e-${{ github.event.deployment_status.environment_url }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright · catalog→checkout
    runs-on: ubuntu-latest
    # Only on a successful, non-production Vercel deploy with a reachable URL.
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment_url != '' &&
      !contains(github.event.deployment_status.environment, 'Production')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          E2E_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
