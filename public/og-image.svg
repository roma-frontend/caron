<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1A2B"/>
      <stop offset="1" stop-color="#06294A"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A7BD4"/>
      <stop offset="0.55" stop-color="#0066AE"/>
      <stop offset="1" stop-color="#064D86"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#page)"/>
  <circle cx="1040" cy="120" r="260" fill="#0066AE" opacity="0.15"/>
  <circle cx="160" cy="560" r="220" fill="#1A7BD4" opacity="0.10"/>

  <!-- brand tile -->
  <g transform="translate(110 215)">
    <rect width="200" height="200" rx="48" fill="url(#tile)"/>
    <rect width="200" height="100" rx="48" fill="#FFFFFF" opacity="0.06"/>
    <path d="M132 138 A50 50 0 1 1 132 62" stroke="#FFFFFF" stroke-width="21" stroke-linecap="round" fill="none"/>
    <circle cx="100" cy="100" r="13" fill="#FFB020"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="350" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" fill="#FFFFFF">Caron</text>
  <text x="354" y="370" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#9FC4E6">Ավտոպահեստամասերի առցանց խանութ</text>
  <text x="354" y="418" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#6E97BD">Հայաստան · caron.am</text>
</svg>
